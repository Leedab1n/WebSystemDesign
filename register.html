<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="이다빈"> 
    <title>[이다빈] - HTML 기초 실습</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2fff2;
            padding: 20px;
        }
        main {
            background-color: #ffffff;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1> 사용자 등록 신청서</h1>
    </header>
    <br/>
    <main>
        <form>
            <fieldset>
                <legend>기본 정보 (Essential)</legend><br/>
                <label for="fname">아이디:</label><br/>
                <input type="text" id="fname" name="fname"
                placeholder="4~12자 영문/숫자" autofocus required><br/><br/>
                <label for="fpwd">비밀번호:</label><br/>
                <input type="password" id="fpwd" name="fpwd" required><br/><br/>
                <label for="femail">이메일:</label><br/>
                <input type="email" id="femail" name="femail" required><br/><br/>
            </fieldset>
            <br>
            <fieldset>
                <legend>부가 정보 (Optional)</legend><br/>
                <label for="phone">연락처:</label><br/>
                <input type="text" id="phone" name="phone"
                placeholder="010-1234-5678"
                pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" required><br/><br/>
                <label for="field">관심 분야:</label><br/>
                <input type="checkbox" id="vehicle1" name="vehicle1" value="HTML5">
                <label for="vehicle1"> HTML5 </label>
                <input type="checkbox" id="vehicle2" name="vehicle2">
                <label for="vehicle2"> CSS3 </label>
                <input type="checkbox" id="vehicle3" name="vehicle3">
                <label for="vehicle3"> JavaScript </label><br/><br/>
                <label for="skill">숙련도:</label><br>
                <input type="range" id="vol" name="vol" min="0" max="100" step="10" required><br/>
            </fieldset>
            <br/>
            <input type="submit" value="가입신청">
            <input type="reset" value="초기화">
        </form>
    </main>
    <br/>
    <br/>
    <footer>
        <a href="index.html">홈으로</a>
        <p>&copy; 2026 이다빈. All rights reserved.</p>
    </footer>
</body>
</html>
